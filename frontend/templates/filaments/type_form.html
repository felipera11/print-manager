{% extends "base.html" %}

{% block title %}{{ "Edit filament type" if filament_type else "New filament type" }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ "Edit filament type" if filament_type else "New filament type" }}</h1>
</div>

<form method="post" class="form">
    <div class="form-group">
        <label for="type">Type</label>
        <input type="text" id="type" name="type" placeholder="e.g. PLA, ABS, TPU" value="{{ filament_type.type if filament_type else '' }}" required>
    </div>

    <div class="form-group">
        <label for="brand">Brand</label>
        <input type="text" id="brand" name="brand" placeholder="e.g. Elegoo, Creality" value="{{ filament_type.brand if filament_type else '' }}" required>
    </div>

    <div class="form-group">
        <label for="cost_per_kg">Cost per kg</label>
        <input type="number" id="cost_per_kg" name="cost_per_kg" step="0.01" min="0" value="{{ filament_type.cost_per_kg if filament_type else '' }}" required>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('list_filaments') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
