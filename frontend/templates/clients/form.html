{% extends "base.html" %}

{% block title %}{{ "Edit client" if client else "New client" }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ "Edit client" if client else "New client" }}</h1>
</div>

{% if error %}
<p class="alert-error">{{ error }}</p>
{% endif %}

<form method="post" class="form">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ client.name if client else '' }}" required>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ client.email if client else '' }}" required>
    </div>

    <div class="form-group">
        <label for="cnpj">CNPJ</label>
        <input type="text" id="cnpj" name="cnpj" value="{{ client.cnpj if client else '' }}" required>
    </div>

    <div class="form-group">
        <label for="address">Address <span class="field-optional">(optional)</span></label>
        <input type="text" id="address" name="address" value="{{ client.address or '' if client else '' }}">
    </div>

    <div class="form-group">
        <label for="mobile">Mobile</label>
        <input type="text" id="mobile" name="mobile" value="{{ client.mobile if client else '' }}" required>
    </div>

    <div class="form-group">
        <label for="phone">Phone <span class="field-optional">(optional)</span></label>
        <input type="text" id="phone" name="phone" value="{{ client.phone or '' if client else '' }}">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('list_clients') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
