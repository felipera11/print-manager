services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: print_manager
      POSTGRES_PASSWORD: print_manager
      POSTGRES_DB: print_manager
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U print_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://print_manager:print_manager@db:5432/print_manager
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "5000:5000"
    depends_on:
      - backend

volumes:
  db_data:
